<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T&T Cafe POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Petit+Formal+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>


<body>

<!------------Login Page-------------->
<div id ="loginPage">
    <div class="login-wrap">
        <div class="login-side-img1">
            <img src="assets/images/login%20page/img1.png" alt="coffee cup">
        </div>
        <div class="login-side-img2">
            <img src="assets/images/login%20page/img2.png" alt="coffee bean">
        </div>

        <div class="login-card">
            <div class="login-logo">
                <img src="assets/images/login%20page/T_T%20Coffee%20Shop%20Logo.png" alt="logo">
            </div>
            <div class="login-title">T&T CAFE</div>
            <div class="login-tagline">Brew joy!!!</div>
            <label class="l-label">Username</label>
            <input class="l-input" id="lu" type="text" placeholder="username" autocomplete="off">
            <label class="l-label">Password</label>
            <input class="l-input" id="lp" type="password" placeholder="••••••">
            <div class="l-err" id="le">⚠️ Invalid credentials!</div>
            <button class="btn-signin" onclick="doLogin()">Sign In</button>
        </div>
    </div>
</div>





<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
